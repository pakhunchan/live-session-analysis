- id: all_problems
  category: stress_test
  description: Everything is bad — low scores across the board
  input:
    sessionId: eval-stress-01
    durationMs: 3600000
    avgMetrics:
      tutor: { eyeContactScore: 0.3, energyScore: 0.3 }
      student: { eyeContactScore: 0.15, energyScore: 0.15 }
    totalInterruptions: 15
    talkTimeRatio: { tutor: 0.9, student: 0.1 }
    engagementScore: 15
    keyMoments:
      - { timestamp: 1000, type: attention_drop, description: "Student disengaged early", metrics: {} }
      - { timestamp: 60000, type: interruption_burst, description: "Frequent interruptions", metrics: {} }
      - { timestamp: 120000, type: energy_shift, description: "Energy crashed", metrics: {} }
      - { timestamp: 180000, type: long_silence, description: "Extended silence", metrics: {} }
      - { timestamp: 240000, type: attention_drop, description: "Student zoned out again", metrics: {} }
    nudgesTriggered:
      - { type: tutor_talk_dominant }
      - { type: low_eye_contact }
      - { type: energy_drop }
      - { type: interruption_spike }
      - { type: student_silent }
  assertions:
    min_recommendations: 3
    max_recommendations: 5
    is_valid_json_array: true
    must_mention_any: [question, listen, engage, participation, break, pause]
