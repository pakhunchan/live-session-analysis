    durationMs: 120000
    avgMetrics:
      tutor: { eyeContactScore: 0.6, energyScore: 0.5 }
      student: { eyeContactScore: 0.5, energyScore: 0.4 }
    totalInterruptions: 0
    talkTimeRatio: { tutor: 0.7, student: 0.3 }
    engagementScore: 50
    keyMoments: []
    nudgesTriggered: []
  assertions:
    min_recommendations: 3
    max_recommendations: 5
    is_valid_json_array: true

- id: empty_moments
  category: edge_case
  description: No key moments and no nudges triggered
  input:
    sessionId: eval-empty-01
    durationMs: 1800000
    avgMetrics:
      tutor: { eyeContactScore: 0.5, energyScore: 0.5 }
      student: { eyeContactScore: 0.5, energyScore: 0.5 }
    totalInterruptions: 0
    talkTimeRatio: { tutor: 0.5, student: 0.5 }
    engagementScore: 55
    keyMoments: []
    nudgesTriggered: []
  assertions:
    min_recommendations: 3
    max_recommendations: 5
