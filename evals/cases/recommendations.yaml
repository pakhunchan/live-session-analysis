- id: high_tutor_talk
  category: talk_balance
  description: Tutor speaks 85% of the session
  input:
    sessionId: eval-talk-01
    durationMs: 1800000
    avgMetrics:
      tutor: { eyeContactScore: 0.7, energyScore: 0.6 }
      student: { eyeContactScore: 0.5, energyScore: 0.4 }
    totalInterruptions: 2
    talkTimeRatio: { tutor: 0.85, student: 0.15 }
    engagementScore: 42
    keyMoments: []
    nudgesTriggered:
      - { type: tutor_talk_dominant }
  assertions:
    min_recommendations: 3
    max_recommendations: 5
    is_valid_json_array: true
    must_mention_any: [question, participation, student speak, listen, dialogue]

- id: strong_session
  category: positive
  description: High engagement, balanced talk time, good metrics
  input:
    sessionId: eval-positive-01
    durationMs: 2700000
    avgMetrics:
      tutor: { eyeContactScore: 0.85, energyScore: 0.7 }
      student: { eyeContactScore: 0.8, energyScore: 0.65 }
    totalInterruptions: 1
    talkTimeRatio: { tutor: 0.55, student: 0.45 }
    engagementScore: 82
    keyMoments:
      - { timestamp: 1000, type: engagement_spike, description: "Student showed high interest", metrics: {} }
    nudgesTriggered: []
  assertions:
    min_recommendations: 3
    max_recommendations: 5
    is_valid_json_array: true

- id: low_student_attention
  category: attention
  description: Low eye contact and energy from student
  input:
    sessionId: eval-attn-01
    durationMs: 2400000
    avgMetrics:
      tutor: { eyeContactScore: 0.75, energyScore: 0.6 }
      student: { eyeContactScore: 0.2, energyScore: 0.25 }
    totalInterruptions: 0
    talkTimeRatio: { tutor: 0.65, student: 0.35 }
    engagementScore: 30
    keyMoments:
      - { timestamp: 1000, type: attention_drop, description: "Student looked away for extended period", metrics: {} }
      - { timestamp: 60000, type: attention_drop, description: "Student disengaged again", metrics: {} }
    nudgesTriggered:
      - { type: low_eye_contact }
  assertions:
    min_recommendations: 3
    max_recommendations: 5
    is_valid_json_array: true
    must_mention_any: [attention, engage, eye contact, focus, visual, interact]

- id: many_interruptions
  category: interruptions
  description: Tutor interrupts student 12 times
  input:
    sessionId: eval-intr-01
    durationMs: 2100000
    avgMetrics:
      tutor: { eyeContactScore: 0.6, energyScore: 0.7 }
      student: { eyeContactScore: 0.5, energyScore: 0.35 }
    totalInterruptions: 12
    talkTimeRatio: { tutor: 0.72, student: 0.28 }
    engagementScore: 38
    keyMoments:
      - { timestamp: 1000, type: interruption_burst, description: "Multiple interruptions in short span", metrics: {} }
    nudgesTriggered:
      - { type: interruption_spike }
  assertions:
    min_recommendations: 3
    max_recommendations: 5
    is_valid_json_array: true
    must_mention_any: [pause, listen, interrupt, wait, space, patient]

- id: energy_crash
  category: energy
  description: Student energy drops mid-session
  input:
    sessionId: eval-energy-01
    durationMs: 2400000
    avgMetrics:
      tutor: { eyeContactScore: 0.7, energyScore: 0.65 }
      student: { eyeContactScore: 0.55, energyScore: 0.2 }
    totalInterruptions: 3
    talkTimeRatio: { tutor: 0.6, student: 0.4 }
    engagementScore: 35
    keyMoments:
      - { timestamp: 1000, type: energy_shift, description: "Student energy dropped significantly", metrics: {} }
    nudgesTriggered:
      - { type: energy_drop }
  assertions:
    min_recommendations: 3
    max_recommendations: 5
    is_valid_json_array: true
    must_mention_any: [energy, break, activity, pace, variety, engage]

- id: very_short_session
  category: edge_case
  description: Only 2 minutes — should still produce valid recs
  input:
